<!DOCTYPE html>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#1A237E",
                        "primary-container": "#E8EAF6",
                        "on-primary": "#FFFFFF",
                        "on-primary-container": "#1A237E",
                        secondary: "#3F51B5",

                        surface: "#FBF8FF",
                        "surface-container": "#F3F0F8",
                        "surface-container-low": "#F5F2FB",

                        outline: "#767683",
                        "outline-variant": "#C6C5D4",
                        "on-surface": "#1B1B21",
                        "on-surface-variant": "#454652"
                    },
                    fontFamily: {
                        sans: ["Plus Jakarta Sans", "Inter", "sans-serif"],
                        headline: ["Plus Jakarta Sans", "sans-serif"],
                        body: ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                        lg: "0.75rem",
                        xl: "1rem",
                        "2xl": "1.5rem",
                        "3xl": "2rem",
                        full: "9999px"
                    }
                }
            }
        };
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; }

</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col pb-24">
<!-- TopAppBar (Based on COMPONENTS_12) -->
<header class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-xl shadow-sm shadow-indigo-900/5 flex items-center justify-between px-6 py-4">
<div class="flex items-center gap-3">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-indigo-50 text-indigo-900 hover:opacity-80 transition-opacity active:scale-95">
<span class="material-symbols-outlined text-[20px]" data-icon="close">close</span>
</button>
<span class="font-sans font-bold tracking-tight text-xl text-indigo-900">Add Expense</span>
</div>
<div class="flex items-center gap-4">
<button class="text-sm font-bold text-indigo-900 hover:opacity-80 transition-opacity px-4 py-2 uppercase tracking-wider">SAVE</button>
<div class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center shadow-inner hover:opacity-80 transition-opacity cursor-pointer">
<span class="material-symbols-outlined text-slate-500" data-icon="settings">settings</span>
</div>
</div>
</header>
<main class="flex-grow max-w-2xl mx-auto w-full px-6 pt-24">
<!-- Input Canvas -->
<div class="space-y-8">
<!-- Amount Section -->
<section class="flex flex-col items-center justify-center py-8">
<span class="text-on-surface-variant text-[10px] font-extrabold uppercase tracking-[0.2em] mb-3 opacity-60">Enter Amount</span>
<div class="flex items-baseline gap-2">
<span class="text-3xl font-bold text-indigo-900/40">$</span>
<span class="text-7xl font-extrabold tracking-tighter text-indigo-900">124.50</span>
</div>
</section>
<!-- Description & Category -->
<section class="space-y-4">
<div class="bg-white border border-indigo-50 p-2 rounded-2xl flex items-center shadow-sm">
<div class="bg-indigo-50 p-3 rounded-xl text-indigo-900">
<span class="material-symbols-outlined" data-icon="description">description</span>
</div>
<input class="bg-transparent border-none focus:ring-0 w-full px-4 text-lg font-semibold text-indigo-900 placeholder:text-slate-300" placeholder="What was it for?" type="text" value="Dinner at Blue Lagoon"/>
</div>
<div class="grid grid-cols-2 gap-3">
<div class="bg-white border border-indigo-50 p-4 rounded-2xl flex items-center justify-between hover:bg-indigo-50/50 transition-colors cursor-pointer shadow-sm group">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-indigo-600" data-icon="calendar_today">calendar_today</span>
<span class="text-sm font-bold text-indigo-900">Today</span>
</div>
<span class="material-symbols-outlined text-xs text-slate-400 group-hover:translate-y-0.5 transition-transform" data-icon="expand_more">expand_more</span>
</div>
<div class="bg-white border border-indigo-50 p-4 rounded-2xl flex items-center justify-between hover:bg-indigo-50/50 transition-colors cursor-pointer shadow-sm group">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-indigo-600" data-icon="category">category</span>
<span class="text-sm font-bold text-indigo-900">Dining</span>
</div>
<span class="material-symbols-outlined text-xs text-slate-400 group-hover:translate-y-0.5 transition-transform" data-icon="expand_more">expand_more</span>
</div>
</div>
</section>
<!-- Participant Logic -->
<section class="space-y-4">
<div class="flex justify-between items-center px-1">
<h2 class="text-lg font-bold text-indigo-900">Split Details</h2>
<button class="text-indigo-600 font-extrabold text-[10px] uppercase tracking-widest hover:underline">Advanced Split</button>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Paid By -->
<div class="bg-white p-5 rounded-2xl shadow-sm border border-indigo-50/50">
<label class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest block mb-4">Paid By</label>
<div class="flex items-center gap-3">
<div class="w-12 h-12 rounded-full bg-indigo-900 flex items-center justify-center text-white shadow-lg shadow-indigo-900/20">
<span class="material-symbols-outlined" data-icon="person" style="font-variation-settings: 'FILL' 1;">person</span>
</div>
<div>
<div class="text-sm font-bold text-indigo-900">You</div>
<div class="text-[11px] font-medium text-slate-500">Full amount</div>
</div>
<button class="ml-auto w-8 h-8 flex items-center justify-center rounded-lg text-indigo-600 hover:bg-indigo-50 transition-colors">
<span class="material-symbols-outlined text-lg" data-icon="swap_horiz">swap_horiz</span>
</button>
</div>
</div>
<!-- Split Type -->
<div class="bg-white p-5 rounded-2xl shadow-sm border border-indigo-50/50">
<label class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest block mb-4">Split Method</label>
<div class="flex items-center gap-3">
<div class="w-12 h-12 rounded-full bg-indigo-50 flex items-center justify-center text-indigo-600">
<span class="material-symbols-outlined" data-icon="equalizer">equalizer</span>
</div>
<div>
<div class="text-sm font-bold text-indigo-900">Equally</div>
<div class="text-[11px] font-medium text-slate-500">4 People</div>
</div>
<button class="ml-auto w-8 h-8 flex items-center justify-center rounded-lg text-indigo-600 hover:bg-indigo-50 transition-colors">
<span class="material-symbols-outlined text-lg" data-icon="edit">edit</span>
</button>
</div>
</div>
</div>
</section>
<!-- Keypad -->
<section class="bg-indigo-50/50 rounded-3xl p-6 mt-6">
<div class="grid grid-cols-3 gap-3">
<button class="h-14 flex items-center justify-center text-2xl font-bold text-indigo-900 hover:bg-white rounded-xl transition-all active:scale-95 shadow-transparent hover:shadow-sm">1</button>
<button class="h-14 flex items-center justify-center text-2xl font-bold text-indigo-900 hover:bg-white rounded-xl transition-all active:scale-95 shadow-transparent hover:shadow-sm">2</button>
<button class="h-14 flex items-center justify-center text-2xl font-bold text-indigo-900 hover:bg-white rounded-xl transition-all active:scale-95 shadow-transparent hover:shadow-sm">3</button>
<button class="h-14 flex items-center justify-center text-2xl font-bold text-indigo-900 hover:bg-white rounded-xl transition-all active:scale-95 shadow-transparent hover:shadow-sm">4</button>
<button class="h-14 flex items-center justify-center text-2xl font-bold text-indigo-900 hover:bg-white rounded-xl transition-all active:scale-95 shadow-transparent hover:shadow-sm">5</button>
<button class="h-14 flex items-center justify-center text-2xl font-bold text-indigo-900 hover:bg-white rounded-xl transition-all active:scale-95 shadow-transparent hover:shadow-sm">6</button>
<button class="h-14 flex items-center justify-center text-2xl font-bold text-indigo-900 hover:bg-white rounded-xl transition-all active:scale-95 shadow-transparent hover:shadow-sm">7</button>
<button class="h-14 flex items-center justify-center text-2xl font-bold text-indigo-900 hover:bg-white rounded-xl transition-all active:scale-95 shadow-transparent hover:shadow-sm">8</button>
<button class="h-14 flex items-center justify-center text-2xl font-bold text-indigo-900 hover:bg-white rounded-xl transition-all active:scale-95 shadow-transparent hover:shadow-sm">9</button>
<button class="h-14 flex items-center justify-center text-2xl font-bold text-indigo-900 hover:bg-white rounded-xl transition-all active:scale-95 shadow-transparent hover:shadow-sm">.</button>
<button class="h-14 flex items-center justify-center text-2xl font-bold text-indigo-900 hover:bg-white rounded-xl transition-all active:scale-95 shadow-transparent hover:shadow-sm">0</button>
<button class="h-14 flex items-center justify-center text-indigo-900 hover:bg-white rounded-xl transition-all active:scale-95 shadow-transparent hover:shadow-sm">
<span class="material-symbols-outlined" data-icon="backspace">backspace</span>
</button>
</div>
<div class="mt-8">
<button class="w-full bg-indigo-900 text-white h-16 rounded-2xl font-bold text-lg shadow-xl shadow-indigo-900/20 flex items-center justify-center gap-2 active:scale-[0.98] transition-all hover:bg-indigo-950">

                    </button>
</div>
</section>
</div>
</main>
<!-- BottomNavBar (Based on COMPONENTS_12) -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-3xl bg-white/70 backdrop-blur-xl shadow-[0_-8px_32px_rgba(27,27,33,0.04)] flex justify-around items-center px-4 py-3 pb-safe">
<div class="flex flex-col items-center justify-center text-slate-400 group cursor-pointer hover:text-indigo-700 transition-all duration-300 ease-out">
<span class="material-symbols-outlined text-2xl" data-icon="dashboard">dashboard</span>
<span class="font-sans font-medium text-[10px] mt-1">Dashboard</span>
</div>
<div class="flex flex-col items-center justify-center text-indigo-900 bg-indigo-50 rounded-xl px-4 py-1 cursor-pointer transition-all duration-300 ease-out">
<span class="material-symbols-outlined text-2xl" data-icon="group">group</span>
<span class="font-sans font-bold text-[10px] mt-1">Groups</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 group cursor-pointer hover:text-indigo-700 transition-all duration-300 ease-out">
<span class="material-symbols-outlined text-2xl" data-icon="insert_chart">insert_chart</span>
<span class="font-sans font-medium text-[10px] mt-1">Reports</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 group cursor-pointer hover:text-indigo-700 transition-all duration-300 ease-out">
<span class="material-symbols-outlined text-2xl" data-icon="person">person</span>
<span class="font-sans font-medium text-[10px] mt-1">Profile</span>
</div>
</nav>
</body></html>
