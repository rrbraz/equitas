<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Equitas - Create Account</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Montserrat:wght@700;800;900&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface": "#fbf8ff",
              "surface-container-high": "#eae7ef",
              "inverse-primary": "#bdc2ff",
              "on-background": "#1b1b21",
              "secondary": "#1b6d24",
              "tertiary-fixed-dim": "#ffb3b1",
              "error": "#ba1a1a",
              "background": "#fbf8ff",
              "on-surface-variant": "#454652",
              "tertiary": "#400007",
              "on-secondary-fixed": "#002204",
              "on-tertiary-fixed": "#410007",
              "secondary-container": "#a0f399",
              "secondary-fixed-dim": "#88d982",
              "outline": "#767683",
              "surface-dim": "#dbd9e1",
              "on-tertiary-fixed-variant": "#80272b",
              "on-error": "#ffffff",
              "error-container": "#ffdad6",
              "on-primary": "#ffffff",
              "surface-container-low": "#f5f2fb",
              "tertiary-fixed": "#ffdad8",
              "surface-tint": "#1A237E",
              "on-primary-container": "#ffffff",
              "on-tertiary-container": "#e87575",
              "on-error-container": "#93000a",
              "on-primary-fixed-variant": "#1A237E",
              "tertiary-container": "#610f16",
              "surface-variant": "#e4e1ea",
              "on-secondary-fixed-variant": "#005312",
              "inverse-on-surface": "#f2eff8",
              "inverse-surface": "#303036",
              "on-primary-fixed": "#000767",
              "surface-container": "#efecf5",
              "primary-container": "#1A237E",
              "secondary-fixed": "#a3f69c",
              "outline-variant": "#c6c5d4",
              "surface-bright": "#fbf8ff",
              "on-surface": "#1b1b21",
              "on-secondary-container": "#217128",
              "surface-container-lowest": "#ffffff",
              "primary-fixed-dim": "#bdc2ff",
              "surface-container-highest": "#e4e1ea",
              "primary": "#1A237E",
              "on-tertiary": "#ffffff",
              "on-secondary": "#ffffff",
              "primary-fixed": "#e0e0ff"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans", "Montserrat", "sans-serif"],
              "body": ["Plus Jakarta Sans", "Inter", "sans-serif"],
              "label": ["Plus Jakarta Sans", "Inter", "sans-serif"]
            },
            borderRadius: {
              "DEFAULT": "8px", 
              "lg": "12px", 
              "xl": "16px", 
              "2xl": "24px",
              "3xl": "32px",
              "full": "9999px"
            },
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-effect {
        backdrop-filter: blur(24px);
        background-color: rgba(255, 255, 255, 0.7);
      }
      .editorial-gradient {
        background: linear-gradient(135deg, #1A237E 0%, #343d96 100%);
      }
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center">
<!-- TopAppBar Shared Component Logic -->
<header class="fixed top-0 w-full z-50 flex items-center justify-center px-6 py-8 bg-surface/70 backdrop-blur-xl">
<h1 class="font-headline font-black text-2xl tracking-tight text-primary">Equitas</h1>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-md mt-24 px-6 space-y-8 flex-grow">
<!-- Header Section -->
<div class="space-y-3 text-center">
<h2 class="font-headline font-extrabold text-4xl text-primary leading-tight tracking-tight">
                Join the atelier.
            </h2>
<p class="text-on-surface-variant font-medium text-base">
                Experience financial clarity with elegance.
            </p>
</div>
<!-- Onboarding Form Container -->
<div class="bg-surface-container-lowest rounded-2xl p-8 shadow-sm shadow-primary/5 border border-outline-variant/20">
<form class="space-y-6">
<!-- Full Name Input -->
<div class="space-y-2">
<label class="font-label font-semibold text-xs uppercase tracking-wider text-on-surface-variant ml-1" for="full_name">Full Name</label>
<input class="w-full bg-surface-container-low border-none rounded-lg px-4 py-3.5 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all placeholder:text-outline/60 text-on-surface font-medium" id="full_name" placeholder="E.g. Julian Smith" type="text"/>
</div>
<!-- Email Input -->
<div class="space-y-2">
<label class="font-label font-semibold text-xs uppercase tracking-wider text-on-surface-variant ml-1" for="email">Email</label>
<input class="w-full bg-surface-container-low border-none rounded-lg px-4 py-3.5 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all placeholder:text-outline/60 text-on-surface font-medium" id="email" placeholder="name@example.com" type="email"/>
</div>
<!-- Password Input -->
<div class="space-y-2">
<label class="font-label font-semibold text-xs uppercase tracking-wider text-on-surface-variant ml-1" for="password">Password</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-lg px-4 py-3.5 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all placeholder:text-outline/60 text-on-surface font-medium" id="password" placeholder="Min. 8 characters" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- CTA Button -->
<button class="w-full editorial-gradient text-on-primary font-headline font-bold py-4 rounded-lg shadow-lg shadow-primary/20 active:scale-[0.98] transition-all" type="submit">
                    Create Account
                </button>
</form>
<!-- Divider -->
<div class="relative py-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/40"></div>
</div>
<div class="relative flex justify-center text-[10px]">
<span class="bg-surface-container-lowest px-4 text-on-surface-variant font-label font-bold uppercase tracking-[0.2em]">Or continue with</span>
</div>
</div>
<!-- Social Login Buttons -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 bg-surface-container-low hover:bg-surface-container-high transition-colors py-3.5 rounded-lg border border-outline-variant/20 group">
<img alt="Google" class="w-5 h-5 group-hover:scale-110 transition-transform" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCa3WHrNzljNVkzrMzBgRMVzgsy-4KVlUXDTqFy4k1V5NOKj6794qAM2WdAYdfxut9F5ytQxMCGh_fduNwNJ7Dy2E2okWr8AktsWTRMUEpgEIxKYr9V5HGw38Efpsb3oELgxaQNAviebNgbvsZ1zsCyFw8sltp0N8H496DXNrqhthMAWc6FrjjlMS3zVb3oha3c-Nvy9d4eA_rHPmCEOsi0RdFwvRlg7hFSeGMtqiROjE63PpLCy9ayga9XHsYEHWFN1p86G9sP5aF2"/>
<span class="font-body font-bold text-sm">Google</span>
</button>
<button class="flex items-center justify-center gap-3 bg-surface-container-low hover:bg-surface-container-high transition-colors py-3.5 rounded-lg border border-outline-variant/20 group">
<span class="material-symbols-outlined text-xl group-hover:scale-110 transition-transform" data-icon="apple" style="font-variation-settings: 'FILL' 1;">apple</span>
<span class="font-body font-bold text-sm">Apple</span>
</button>
</div>
</div>
<!-- Footer Links -->
<p class="text-center font-body text-sm text-on-surface-variant font-medium">
            Already have an account? 
            <a class="text-primary font-extrabold hover:underline underline-offset-4" href="#">Log in</a>
</p>
</main>
<!-- Support Footer -->
<footer class="w-full py-8 text-center mt-auto">
<div class="flex items-center justify-center gap-6 text-[10px] text-on-surface-variant/60 font-label font-bold tracking-[0.15em] uppercase">
<a class="hover:text-primary transition-colors" href="#">Privacy</a>
<span class="w-1 h-1 bg-outline-variant rounded-full"></span>
<a class="hover:text-primary transition-colors" href="#">Terms</a>
<span class="w-1 h-1 bg-outline-variant rounded-full"></span>
<a class="hover:text-primary transition-colors" href="#">Security</a>
</div>
</footer>
<!-- Aesthetic Background Elements -->
<div class="fixed -z-10 top-[-10%] right-[-10%] w-[50%] h-[50%] editorial-gradient opacity-[0.05] blur-[120px] rounded-full"></div>
<div class="fixed -z-10 bottom-[-5%] left-[-5%] w-[40%] h-[40%] bg-secondary opacity-[0.03] blur-[100px] rounded-full"></div>
</body></html>
